<!--
  サカイオートサービス — 顧客管理・予約・車検リマインド デモ
  静的SPA（ビルド無し / Vanilla JS / localStorage 永続化）
  読込順が重要: data.js → notifications.js → admin.js → customer.js → app.js
-->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#12161c" />
<title>サカイオートサービス｜顧客管理・車検リマインド</title>
<link rel="stylesheet" href="styles.css" />

<!-- アプリ骨格。中身は各ビューの render() が描画する -->
<header class="app-header">
  <div class="app-header__brand">
    <span class="app-header__mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M8 13 L6.5 9 Q12 4.5 16.5 8.8 L16.8 13" />
        <path d="M4 7 L5.8 8 L6.5 9 L5.8 10.4 L4 11.4" />
        <circle cx="7.5" cy="16" r="3" />
        <circle cx="16.5" cy="16" r="3" />
        <circle cx="7.5" cy="16" r="0.9" fill="currentColor" stroke="none" />
        <circle cx="16.5" cy="16" r="0.9" fill="currentColor" stroke="none" />
      </svg>
    </span>
    <div class="app-header__titles">
      <div class="app-header__name">サカイオートサービス</div>
      <div class="app-header__sub">顧客管理・予約・車検リマインド</div>
    </div>
  </div>

  <nav class="view-tabs" role="tablist" aria-label="表示切替">
    <button class="view-tab is-active" data-view="admin" role="tab" type="button">店舗側（管理画面）</button>
    <button class="view-tab" data-view="customer" role="tab" type="button">お客様側（スマホ）</button>
  </nav>
</header>

<main class="app-main">
  <!-- 店舗側 管理画面 -->
  <section class="admin-view" id="admin-view">
    <div id="admin-root"></div>
  </section>

  <!-- お客様側 スマホ画面 -->
  <section class="customer-view is-hidden" id="customer-view">
    <div id="customer-root"></div>
  </section>
</main>

<script src="data.js"></script>
<script src="notifications.js"></script>
<!-- 店舗側 管理画面のモジュール群（admin.js シェルが束ねる） -->
<script src="adm-sidebar.js"></script>
<script src="adm-kpi.js"></script>
<script src="adm-sales.js"></script>
<script src="adm-reservations.js"></script>
<script src="adm-customers.js"></script>
<script src="adm-notifications.js"></script>
<script src="admin.js"></script>
<script src="customer.js"></script>
<script src="app.js"></script>
